services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mts-logistics-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mts_logistics
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-env
      NODE_ENV: development
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mts-logistics-web
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    depends_on:
      - api
    volumes:
      - ./frontend:/app

  postgres:
    image: postgres:16-alpine
    container_name: mts-logistics-postgres
    environment:
      POSTGRES_DB: mts_logistics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mts-logistics-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
